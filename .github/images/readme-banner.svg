<!-- File: .github/images/readme-banner.svg -->
<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bannerBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060C18"/>
      <stop offset="100%" stop-color="#02040B"/>
    </linearGradient>

    <linearGradient id="ring1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0"/>
      <stop offset="50%" stop-color="#3B82F6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="ring2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60A5FA" stop-opacity="0"/>
      <stop offset="50%" stop-color="#60A5FA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#60A5FA" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="thetaGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bannerBg)"/>

  <!-- Theta Star mark (left) -->
  <g transform="translate(130,60) scale(0.9)">
    <ellipse cx="100" cy="100" rx="92" ry="30"
      stroke="url(#ring1)" stroke-width="0.7" opacity="0.35" fill="none"/>
    <ellipse cx="100" cy="100" rx="88" ry="26"
      stroke="url(#ring2)" stroke-width="0.5" opacity="0.2" fill="none"/>
    <text x="100" y="117" text-anchor="middle"
      font-family="'IBM Plex Serif', Georgia, serif"
      font-size="92" font-weight="400"
      fill="url(#thetaGrad)">Θ</text>
    <text x="150" y="62" text-anchor="middle"
      font-family="'IBM Plex Sans', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
      font-size="26" font-weight="300"
      fill="#3B82F6" opacity="0.85">✱</text>
    <g opacity="0.25" stroke="#3B82F6" fill="#3B82F6">
      <line x1="72" y1="150" x2="72" y2="166" stroke-width="0.6"/>
      <circle cx="72" cy="168" r="1.5" stroke="none"/>
      <line x1="89" y1="153" x2="89" y2="172" stroke-width="0.6"/>
      <circle cx="89" cy="174" r="1.5" stroke="none"/>
      <line x1="111" y1="153" x2="111" y2="172" stroke-width="0.6"/>
      <circle cx="111" cy="174" r="1.5" stroke="none"/>
      <line x1="128" y1="150" x2="128" y2="166" stroke-width="0.6"/>
      <circle cx="128" cy="168" r="1.5" stroke="none"/>
      <line x1="72" y1="159" x2="128" y2="159" stroke-width="0.35"/>
    </g>
  </g>

  <!-- Text block (right) -->
  <text x="360" y="135"
    font-family="'IBM Plex Sans', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="64" font-weight="500"
    letter-spacing="0.18em"
    fill="#D8DEE9">
    CED-AH
  </text>

  <text x="360" y="178"
    font-family="'IBM Plex Serif', Georgia, serif"
    font-size="24" font-weight="300"
    fill="#6B7A94">
    Arqory Research Institute
  </text>
</svg>
