name: Stale Issues

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          exempt-issue-labels: 'P0:critical,P1:important'
          exempt-pr-labels: 'P0:critical,P1:important'
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            activity in 60 days. It will be closed in 14 days if no further activity
            occurs. Priority issues (P0, P1) are exempt from auto-closing.
            If this issue is still relevant, please comment to keep it open.
          close-issue-message: >
            This issue was closed after 74 days of inactivity. If circumstances have
            changed and this issue is still relevant, feel free to reopen it.
          stale-pr-message: >
            This pull request has been automatically marked as stale because it has not
            had activity in 60 days. It will be closed in 14 days if no further activity
            occurs. If this PR is still in progress, please comment or push changes to
            keep it open.
          close-pr-message: >
            This pull request was closed after 74 days of inactivity. If you'd like to
            continue this work, feel free to reopen it.
