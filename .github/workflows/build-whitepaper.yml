name: Build Complete Whitepaper

on:
  push:
    paths:
      - 'whitepaper/**/main.md'
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Concatenate whitepaper parts
        run: bash scripts/build-whitepaper.sh

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f whitepaper-complete.md
          git diff --cached --quiet || git commit -m "build: auto-generate whitepaper-complete.md"
          git push || true
